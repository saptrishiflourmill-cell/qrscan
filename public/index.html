<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Registration - VisitManager</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 20px; margin: 0; }
    .reg-container { max-width: 700px; width: 100%; margin: 20px auto; }
    .reg-header { text-align: center; margin-bottom: 24px; }
    .reg-header .logo { width: 64px; height: 64px; background: var(--primary); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; margin: 0 auto 12px; }
    .reg-header h1 { font-size: 24px; font-weight: 700; color: var(--text); }
    .reg-header p { color: var(--text-light); font-size: 14px; }
    @media (max-width: 768px) { body { padding: 12px; } }
  </style>
</head>
<body>
  <div class="reg-container">
    <div class="reg-header">
      <div class="logo">&#9662;</div>
      <h1>VisitManager</h1>
      <p>Visitor Registration System</p>
    </div>

    <div class="content-card" id="formCard">
      <div class="card-header">
        <h2>Visitor Registration Form</h2>
      </div>
      <div class="card-body">
        <form id="visitorForm" enctype="multipart/form-data">
          <div class="form-row">
            <div class="form-group">
              <label class="required">Full Name</label>
              <input type="text" name="fullName" id="fullName" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
              <label class="required">Phone Number</label>
              <input type="tel" name="phone" id="phone" placeholder="Enter phone number" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" id="email" placeholder="Enter email (optional)">
            </div>
            <div class="form-group">
              <label class="required">Company / Organization</label>
              <input type="text" name="company" id="company" placeholder="Enter company name" required>
            </div>
          </div>

          <div class="form-group">
            <label class="required">Address</label>
            <textarea name="address" id="address" placeholder="Enter address" required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="required">Person to Meet</label>
              <input type="text" name="personToMeet" id="personToMeet" placeholder="Enter person to meet" required>
            </div>
            <div class="form-group">
              <label class="required">Purpose of Visit</label>
              <input type="text" name="purpose" id="purpose" placeholder="Enter purpose" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="required">Entry Date</label>
              <input type="date" name="entryDate" id="entryDate" required>
            </div>
            <div class="form-group">
              <label class="required">Entry Time</label>
              <input type="time" name="entryTime" id="entryTime" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Expected Exit Time</label>
              <input type="time" name="exitTime" id="exitTime">
            </div>
            <div class="form-group">
              <label>Vehicle Number</label>
              <input type="text" name="vehicleNumber" id="vehicleNumber" placeholder="Enter vehicle number (optional)">
            </div>
          </div>

          <div class="form-group">
            <label>Photo</label>
            <input type="file" name="photo" id="photo" accept="image/*" onchange="previewPhoto(event)">
            <img id="photoPreview" class="photo-preview" alt="Preview">
          </div>

          <div class="form-actions">
            <button type="reset" class="btn btn-outline">Reset</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">Register Visitor</button>
          </div>
        </form>
      </div>
    </div>

    <div class="content-card" id="successCard" style="display:none">
      <div class="card-body">
        <div class="success-message">
          <div class="success-icon">&#10003;</div>
          <h2>Visitor Registered Successfully!</h2>
          <p id="successVisitorId"></p>
          <div class="qr-display">
            <img id="qrCodeImg" alt="QR Code">
            <p style="margin-top:8px;font-size:13px;color:var(--text-light);word-break:break-all" id="qrDataText"></p>
          </div>
          <div class="qr-actions" style="flex-wrap:wrap">
            <button class="btn btn-primary" onclick="downloadQR()">Download QR</button>
            <button class="btn btn-secondary" onclick="printQR()">Print QR</button>
            <button class="btn btn-warning" onclick="downloadPass()">Download Pass</button>
            <button class="btn btn-outline" onclick="registerAnother()">Register Another</button>
          </div>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-light)">
      Powered by VisitManager
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const today = new Date().toISOString().split('T')[0];
      const now = new Date().toTimeString().split(' ')[0].slice(0, 5);
      document.getElementById('entryDate').value = today;
      document.getElementById('entryTime').value = now;

      document.getElementById('visitorForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Registering...';

        const formData = new FormData(this);

        try {
          const res = await fetch('/api/visitors', { method: 'POST', body: formData });
          const data = await res.json();

          if (!res.ok) {
            let msg = 'Registration failed';
            if (data.errors) msg = data.errors.map(e => e.msg).join(', ');
            else if (data.error) msg = data.error;
            showToast(msg, 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Register Visitor';
            return;
          }

          document.getElementById('formCard').style.display = 'none';
          document.getElementById('successCard').style.display = 'block';
          document.getElementById('successVisitorId').textContent = 'Visitor ID: ' + data.visitor.visitorId;
          document.getElementById('qrCodeImg').src = data.qrCodeUrl + '?t=' + Date.now();
          document.getElementById('qrDataText').textContent = data.qrData;

          window.lastQRData = data;
          showToast('Visitor registered successfully!', 'success');
        } catch (err) {
          showToast('Error: ' + err.message, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Register Visitor';
        }
      });
    });

    function previewPhoto(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const preview = document.getElementById('photoPreview');
          preview.src = ev.target.result;
          preview.classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    }

    function downloadQR() {
      if (window.lastQRData) {
        const link = document.createElement('a');
        link.download = window.lastQRData.visitor.visitorId + '-qr.png';
        link.href = document.getElementById('qrCodeImg').src;
        link.click();
      }
    }

    function downloadPass() {
      if (window.lastQRData) {
        window.open('/pass.html?id=' + window.lastQRData.visitor.visitorId, '_blank');
      }
    }

    function printQR() {
      const qrImg = document.getElementById('qrCodeImg').src;
      const win = window.open('', '_blank');
      win.document.write('<html><head><title>Print QR Code</title><style>body{text-align:center;padding:40px;font-family:sans-serif}img{max-width:300px}</style></head><body>');
      win.document.write('<h2>Visitor QR Code</h2>');
      win.document.write('<p>' + (window.lastQRData ? window.lastQRData.visitor.visitorId : '') + '</p>');
      win.document.write('<img src="' + qrImg + '" onload="window.print();window.close()">');
      win.document.write('</body></html>');
      win.document.close();
    }

    function registerAnother() {
      document.getElementById('formCard').style.display = 'block';
      document.getElementById('successCard').style.display = 'none';
      document.getElementById('visitorForm').reset();
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = 'Register Visitor';
      document.getElementById('photoPreview').classList.remove('show');
      const today = new Date().toISOString().split('T')[0];
      const now = new Date().toTimeString().split(' ')[0].slice(0, 5);
      document.getElementById('entryDate').value = today;
      document.getElementById('entryTime').value = now;
    }

    function showToast(msg, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
