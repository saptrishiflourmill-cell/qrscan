<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visitor Registration</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #03010A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-x: hidden;
    }

    #fluid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .reg-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      margin: 20px auto;
    }

    .reg-header {
      text-align: center;
      margin-bottom: 24px;
      padding: 0 8px;
    }

    .reg-header .logo-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .reg-header .logo-wrap span {
      font-size: 36px;
      color: #fff;
    }

    .reg-header h1 {
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .reg-header p {
      font-size: clamp(13px, 3vw, 15px);
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      font-weight: 400;
    }

    .glass-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: clamp(20px, 4vw, 36px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }

    .glass-card:hover {
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .card-title {
      font-size: clamp(18px, 4vw, 22px);
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .card-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 24px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 14px;
      position: relative;
    }

    .form-group .floating-label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      pointer-events: none;
      transition: all 0.2s ease;
      background: transparent;
      padding: 0 4px;
      font-weight: 400;
    }

    .form-group textarea ~ .floating-label {
      top: 18px;
      transform: none;
    }

    .form-group .floating-label.active {
      top: -8px;
      transform: none;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(4px);
      border-radius: 4px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 14px 14px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: all 0.25s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      padding-top: 18px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: transparent;
    }

    .form-group input:focus ~ .floating-label,
    .form-group textarea:focus ~ .floating-label,
    .form-group input:not(:placeholder-shown) ~ .floating-label,
    .form-group textarea:not(:placeholder-shown) ~ .floating-label {
      top: -8px;
      transform: none;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(4px);
      border-radius: 4px;
    }

    .form-group input[type="date"] ~ .floating-label,
    .form-group input[type="time"] ~ .floating-label {
      top: -8px;
      transform: none;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .form-group input[type="file"] {
      padding: 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    .form-group input[type="file"]::file-selector-button {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      margin-right: 10px;
      transition: background 0.2s;
    }

    .form-group input[type="file"]::file-selector-button:hover {
      background: rgba(255,255,255,0.2);
    }

    .photo-preview {
      max-width: 120px;
      max-height: 120px;
      border-radius: 12px;
      margin-top: 8px;
      display: none;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .photo-preview.show { display: block; }

    .btn-submit {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
      margin-top: 4px;
    }

    .btn-submit:hover {
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.12) 100%);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(255,255,255,0.08);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-submit .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-reset {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-reset:hover {
      border-color: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
    }

    .success-card {
      text-align: center;
      padding: 20px 0;
    }

    .success-icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, rgba(16,185,129,0.3) 0%, rgba(16,185,129,0.1) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(16,185,129,0.2);
    }

    .success-icon-wrap span { font-size: 36px; }

    .success-card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .success-card .visitor-id {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      font-family: monospace;
      margin-bottom: 20px;
    }

    .qr-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .qr-box img {
      max-width: 180px;
      height: auto;
    }

    .qr-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .qr-actions .btn-action {
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      min-width: 100px;
      text-align: center;
      text-decoration: none;
    }

    .qr-actions .btn-action:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .qr-actions .btn-action.primary {
      background: rgba(59,130,246,0.25);
      border-color: rgba(59,130,246,0.3);
    }

    .qr-actions .btn-action.primary:hover {
      background: rgba(59,130,246,0.35);
    }

    .qr-actions .btn-action.success {
      background: rgba(16,185,129,0.25);
      border-color: rgba(16,185,129,0.3);
    }

    .qr-actions .btn-action.success:hover {
      background: rgba(16,185,129,0.35);
    }

    .qr-actions .btn-action.warning {
      background: rgba(245,158,11,0.25);
      border-color: rgba(245,158,11,0.3);
    }

    .qr-actions .btn-action.warning:hover {
      background: rgba(245,158,11,0.35);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 14px;
      color: #fff;
      font-size: 14px;
      z-index: 10000;
      animation: toastIn 0.3s ease;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .toast.error { background: rgba(239,68,68,0.8); }
    .toast.success { background: rgba(16,185,129,0.8); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .pass-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .pass-card-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pass-card-wrap .p-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .pass-card-wrap .p-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .pass-card-wrap .p-header .p-id {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-family: monospace;
      background: rgba(255,255,255,0.06);
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .qr-glow-box {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .qr-glow-box::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 26px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #6366f1, #8b5cf6);
      background-size: 300% 300%;
      z-index: -1;
      animation: borderGlow 3s ease infinite;
      opacity: 0.4;
    }
    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .qr-glow-box img {
      max-width: 200px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
    }
    .qr-scan-line {
      position: absolute;
      left: 24px;
      right: 24px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #818cf8, transparent);
      animation: scanLine 2.5s ease-in-out infinite;
      opacity: 0.6;
    }
    @keyframes scanLine {
      0% { top: 28px; opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { top: calc(100% - 28px); opacity: 0; }
    }

    .p-details {
      margin-top: 14px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .p-details .p-photo {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .p-details .p-photo-initial {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .p-details .p-info {
      flex: 1;
      min-width: 0;
    }
    .p-details .p-info .p-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }
    .p-details .p-info .p-company {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .p-details .p-info .p-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
    }
    .p-details .p-info .p-meta span {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
    .p-details .p-info .p-meta span strong {
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .p-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .p-actions .p-btn {
      flex: 1;
      min-width: calc(50% - 4px);
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .p-actions .p-btn:active {
      transform: scale(0.96);
      background: rgba(255,255,255,0.1);
    }
    .p-actions .p-btn.dl {
      background: rgba(59,130,246,0.2);
      border-color: rgba(59,130,246,0.25);
    }
    .p-actions .p-btn.print {
      background: rgba(16,185,129,0.2);
      border-color: rgba(16,185,129,0.25);
    }
    .p-actions .p-btn.pass {
      background: rgba(99,102,241,0.2);
      border-color: rgba(99,102,241,0.25);
    }

    @media (max-width: 480px) {
      .qr-glow-box img { max-width: 160px; }
      .p-details { padding: 14px; }
      .p-details .p-photo, .p-details .p-photo-initial { width: 50px; height: 50px; font-size: 20px; }
      .p-details .p-info .p-name { font-size: 16px; }
      .p-actions .p-btn { font-size: 12px; padding: 11px; }
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .reg-wrapper { margin: 10px auto; }
      .glass-card { padding: 18px; border-radius: 18px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
      .form-group { margin-bottom: 12px; }
      .form-group input, .form-group textarea { padding: 13px 13px 11px; font-size: 16px; }
      .reg-header .logo-wrap { width: 60px; height: 60px; border-radius: 18px; }
      .reg-header .logo-wrap span { font-size: 28px; }
      .btn-submit { padding: 15px 20px; font-size: 15px; }
      .qr-box { padding: 14px; }
      .qr-box img { max-width: 140px; }
      .qr-actions .btn-action { font-size: 12px; padding: 8px 12px; min-width: 80px; }
    }

    @media (max-width: 360px) {
      .glass-card { padding: 14px; }
      .form-group input, .form-group textarea { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div id="fluid-bg"></div>

  <div class="reg-wrapper">
    <div class="reg-header">
      <div class="logo-wrap"><span>&#9670;</span></div>
      <h1>VisitManager</h1>
      <p>Visitor Registration</p>
    </div>

    <div class="glass-card" id="formCard">
      <div class="card-title">Register Visitor</div>
      <div class="card-subtitle">Fill in the details to generate a QR pass</div>

      <form id="visitorForm" enctype="multipart/form-data">
        <div class="form-row">
          <div class="form-group">
            <input type="text" id="fullName" name="fullName" placeholder="Full Name" required>
            <label class="floating-label" for="fullName">Full Name</label>
          </div>
          <div class="form-group">
            <input type="tel" id="phone" name="phone" placeholder="Phone" required>
            <label class="floating-label" for="phone">Phone Number</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <input type="email" id="email" name="email" placeholder="Email">
            <label class="floating-label" for="email">Email (optional)</label>
          </div>
          <div class="form-group">
            <input type="text" id="company" name="company" placeholder="Company" required>
            <label class="floating-label" for="company">Company</label>
          </div>
        </div>

        <div class="form-group">
          <textarea id="address" name="address" placeholder="Address" required></textarea>
          <label class="floating-label" for="address">Address</label>
        </div>

        <div class="form-row">
          <div class="form-group">
            <input type="text" id="personToMeet" name="personToMeet" placeholder="Person to Meet" required>
            <label class="floating-label" for="personToMeet">Person to Meet</label>
          </div>
          <div class="form-group">
            <input type="text" id="purpose" name="purpose" placeholder="Purpose" required>
            <label class="floating-label" for="purpose">Purpose of Visit</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <input type="date" id="entryDate" name="entryDate" required>
            <label class="floating-label" for="entryDate">Entry Date</label>
          </div>
          <div class="form-group">
            <input type="time" id="entryTime" name="entryTime" required>
            <label class="floating-label" for="entryTime">Entry Time</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <input type="time" id="exitTime" name="exitTime">
            <label class="floating-label" for="exitTime">Exit Time (optional)</label>
          </div>
          <div class="form-group">
            <input type="text" id="vehicleNumber" name="vehicleNumber" placeholder="Vehicle">
            <label class="floating-label" for="vehicleNumber">Vehicle Number</label>
          </div>
        </div>

        <div class="form-group">
          <input type="file" id="photo" name="photo" accept="image/*" onchange="previewPhoto(event)">
          <img id="photoPreview" class="photo-preview" alt="Preview">
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-content">
            <span id="btnText">Register Visitor</span>
          </span>
        </button>
        <button type="reset" class="btn-reset" onclick="resetForm()">Clear All Fields</button>
      </form>
    </div>

    <div id="successCard" style="display:none">
      <div class="pass-card-wrap">
        <div class="p-header">
          <h2>&#10003; Registered</h2>
          <span class="p-id" id="successVisitorId"></span>
        </div>

        <div class="qr-glow-box" id="qrBox">
          <div class="qr-scan-line"></div>
          <img id="qrCodeImg" alt="QR Code">
        </div>
        <img id="qrCodeImgHidden" alt="" style="display:none">

        <div class="p-details" id="passDetails">
          <div id="passPhotoWrap"></div>
          <div class="p-info">
            <div class="p-name" id="passName"></div>
            <div class="p-company" id="passCompany"></div>
            <div class="p-meta">
              <span>Meeting <strong id="passMeeting">-</strong></span>
              <span>Date <strong id="passDate">-</strong></span>
              <span>Time <strong id="passTime">-</strong></span>
            </div>
          </div>
        </div>

        <div class="p-actions">
          <button class="p-btn dl" onclick="downloadQR()">Download QR</button>
          <button class="p-btn print" onclick="printQR()">Print QR</button>
          <button class="p-btn pass" onclick="downloadPass()">Get Pass</button>
          <button class="p-btn" onclick="registerAnother()">New Visitor</button>
        </div>
      </div>

      <canvas id="passParticles" class="pass-canvas"></canvas>
    </div>

    <div class="footer-text">VISITMANAGER &#8226; SECURE VISITOR SYSTEM</div>
  </div>

  <script type="module">
    import { createFerrofluid } from '/js/ferrofluid.js';

    const container = document.getElementById('fluid-bg');
    let cleanup = null;

    try {
      cleanup = createFerrofluid(container, {
        speed: 0.5,
        scale: 1.6,
        turbulence: 1.2,
        fluidity: 0.15,
        rimWidth: 0.25,
        sharpness: 2.5,
        shimmer: 1.5,
        glow: 2.5,
        opacity: 0.9,
        mouseStrength: 1.0,
        mouseRadius: 0.35
      });
    } catch (e) {
      console.log('Fluid background:', e.message);
    }

    window.addEventListener('beforeunload', () => {
      if (cleanup) cleanup();
      stopPassParticles();
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const today = new Date().toISOString().split('T')[0];
      const now = new Date().toTimeString().split(' ')[0].slice(0, 5);
      document.getElementById('entryDate').value = today;
      document.getElementById('entryTime').value = now;

      document.querySelectorAll('input, textarea').forEach(el => {
        el.addEventListener('blur', function() {
          if (this.value) this.closest('.form-group')?.querySelector('.floating-label')?.classList.add('active');
          else this.closest('.form-group')?.querySelector('.floating-label')?.classList.remove('active');
        });
        if (el.value) {
          el.closest('.form-group')?.querySelector('.floating-label')?.classList.add('active');
        }
      });

      document.getElementById('visitorForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const content = btn.querySelector('.btn-content');
        btn.disabled = true;
        btnText.textContent = 'Registering...';
        const sp = document.createElement('span');
        sp.className = 'spinner';
        content.appendChild(sp);

        const formData = new FormData(this);

        try {
          const res = await fetch('/api/visitors', { method: 'POST', body: formData });
          const data = await res.json();

          if (!res.ok) {
            let msg = 'Registration failed';
            if (data.errors) msg = data.errors.map(e => e.msg).join(', ');
            else if (data.error) msg = data.error;
            showToast(msg, 'error');
            btn.disabled = false;
            btnText.textContent = 'Register Visitor';
            sp.remove();
            return;
          }

          document.getElementById('formCard').style.display = 'none';
          document.getElementById('successCard').style.display = 'block';
          document.getElementById('successVisitorId').textContent = data.visitor.visitorId;
          const qrUrl = data.qrCodeUrl + '?t=' + Date.now();
          document.getElementById('qrCodeImg').src = qrUrl;
          document.getElementById('qrCodeImgHidden').src = qrUrl;
          window.lastQRData = data;
          showToast('Visitor registered successfully!', 'success');

          document.getElementById('passName').textContent = data.visitor.fullName || 'Visitor';
          document.getElementById('passCompany').textContent = data.visitor.company || '';
          document.getElementById('passMeeting').textContent = data.visitor.personToMeet || '-';
          document.getElementById('passDate').textContent = data.visitor.entryDate || '-';
          document.getElementById('passTime').textContent = data.visitor.entryTime || '-';

          const pw = document.getElementById('passPhotoWrap');
          if (data.visitor.photo) {
            pw.innerHTML = '<img class="p-photo" src="/uploads/' + data.visitor.photo + '?t=' + Date.now() + '" alt="">';
          } else {
            const init = (data.visitor.fullName || '?').charAt(0).toUpperCase();
            pw.innerHTML = '<div class="p-photo-initial">' + init + '</div>';
          }

          startPassParticles();
        } catch (err) {
          showToast('Error: ' + err.message, 'error');
          btn.disabled = false;
          btnText.textContent = 'Register Visitor';
          sp.remove();
        }
      });
    });

    function previewPhoto(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const preview = document.getElementById('photoPreview');
          preview.src = ev.target.result;
          preview.classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    }

    function downloadQR() {
      if (window.lastQRData) {
        const link = document.createElement('a');
        link.download = window.lastQRData.visitor.visitorId + '-qr.png';
        link.href = document.getElementById('qrCodeImgHidden').src || document.getElementById('qrCodeImg').src;
        link.click();
        showToast('QR code downloaded', 'success');
      }
    }

    function downloadPass() {
      if (window.lastQRData) {
        window.open('/pass.html?id=' + window.lastQRData.visitor.visitorId, '_blank');
      }
    }

    function printQR() {
      const qrImg = document.getElementById('qrCodeImgHidden').src || document.getElementById('qrCodeImg').src;
      const win = window.open('', '_blank');
      win.document.write('<html><head><title>Print QR</title><style>body{text-align:center;padding:40px;font-family:Inter,sans-serif;background:#fff}img{max-width:300px}</style></head><body>');
      win.document.write('<h2>Visitor QR Code</h2>');
      win.document.write('<p>' + (window.lastQRData ? window.lastQRData.visitor.visitorId : '') + '</p>');
      win.document.write('<img src="' + qrImg + '" onload="window.print();window.close()">');
      win.document.write('</body></html>');
      win.document.close();
    }

    let _particleAnimId = null;

    function startPassParticles() {
      const canvas = document.getElementById('passParticles');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let w = canvas.width = window.innerWidth;
      let h = canvas.height = window.innerHeight;
      const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
      window.addEventListener('resize', resize);
      const pts = [];
      for (let i = 0; i < 50; i++) {
        pts.push({
          x: Math.random() * w, y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4, vy: -Math.random() * 0.3 - 0.1,
          r: Math.random() * 2 + 1, o: Math.random() * 0.3 + 0.1,
        });
      }
      function frame() {
        ctx.clearRect(0, 0, w, h);
        for (const p of pts) {
          p.x += p.vx; p.y += p.vy;
          if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
          if (p.x < -10) p.x = w + 10;
          if (p.x > w + 10) p.x = -10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(129,140,248,' + p.o + ')';
          ctx.fill();
        }
        _particleAnimId = requestAnimationFrame(frame);
      }
      frame();
    }

    function stopPassParticles() {
      if (_particleAnimId) { cancelAnimationFrame(_particleAnimId); _particleAnimId = null; }
      const canvas = document.getElementById('passParticles');
      if (canvas) {
        const ctx = canvas.getContext('2d');
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    function registerAnother() {
      stopPassParticles();
      document.getElementById('formCard').style.display = 'block';
      document.getElementById('successCard').style.display = 'none';
      resetForm();
      document.getElementById('submitBtn').disabled = false;
      const today = new Date().toISOString().split('T')[0];
      const now = new Date().toTimeString().split(' ')[0].slice(0, 5);
      document.getElementById('entryDate').value = today;
      document.getElementById('entryTime').value = now;
    }

    function resetForm() {
      document.getElementById('visitorForm').reset();
      document.getElementById('photoPreview').classList.remove('show');
      document.querySelectorAll('.floating-label').forEach(l => l.classList.remove('active'));
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('btnText').textContent = 'Register Visitor';
      const sp = document.querySelector('#submitBtn .spinner');
      if (sp) sp.remove();
    }

    function showToast(msg, type) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
