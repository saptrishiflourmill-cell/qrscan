<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Details - Visitor Management System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">&#9662;</div>
        <div>
          <h2>VisitManager</h2>
          <p>Visitor Management System</p>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/"><span class="icon">&#9998;</span> Register Visitor</a>
        <a href="/dashboard.html"><span class="icon">&#9776;</span> Dashboard</a>
        <a href="/scanner.html"><span class="icon">&#128247;</span> Scan QR</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
          <h1>Visitor Details</h1>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-outline" onclick="window.print()">Print</button>
          <a href="/dashboard.html" class="btn btn-primary">Dashboard</a>
        </div>
      </div>

      <div id="loadingState" class="loading"><div class="spinner"></div><p>Loading visitor details...</p></div>
      <div id="errorState" class="empty-state" style="display:none">
        <div class="empty-icon">&#128533;</div>
        <h3>Visitor Not Found</h3>
        <p id="errorMsg">The visitor ID you are looking for does not exist.</p>
        <div style="margin-top:16px">
          <a href="/dashboard.html" class="btn btn-primary">Go to Dashboard</a>
          <a href="/scanner.html" class="btn btn-outline">Scan Again</a>
        </div>
      </div>

      <div id="visitorContent" style="display:none">
        <div class="content-card">
          <div class="card-header">
            <h2 id="detailVisitorId"></h2>
            <span id="detailStatusBadge"></span>
          </div>
          <div class="card-body">
            <div class="visitor-detail">
              <div class="photo-section">
                <div id="detailPhotoContainer"></div>
                <div style="margin-top:16px">
                  <a id="passLink" href="#" class="btn btn-primary" target="_blank">View Visitor Pass</a>
                </div>
              </div>
              <div>
                <div class="detail-grid">
                  <div class="detail-item">
                    <label>Full Name</label>
                    <p id="detailFullName"></p>
                  </div>
                  <div class="detail-item">
                    <label>Phone Number</label>
                    <p id="detailPhone"></p>
                  </div>
                  <div class="detail-item">
                    <label>Email</label>
                    <p id="detailEmail"></p>
                  </div>
                  <div class="detail-item">
                    <label>Address</label>
                    <p id="detailAddress"></p>
                  </div>
                  <div class="detail-item">
                    <label>Company / Organization</label>
                    <p id="detailCompany"></p>
                  </div>
                  <div class="detail-item">
                    <label>Person to Meet</label>
                    <p id="detailPersonToMeet"></p>
                  </div>
                  <div class="detail-item">
                    <label>Purpose of Visit</label>
                    <p id="detailPurpose"></p>
                  </div>
                  <div class="detail-item">
                    <label>Entry Date</label>
                    <p id="detailEntryDate"></p>
                  </div>
                  <div class="detail-item">
                    <label>Entry Time</label>
                    <p id="detailEntryTime"></p>
                  </div>
                  <div class="detail-item">
                    <label>Exit Time</label>
                    <p id="detailExitTime"></p>
                  </div>
                  <div class="detail-item">
                    <label>Vehicle Number</label>
                    <p id="detailVehicleNumber"></p>
                  </div>
                  <div class="detail-item">
                    <label>Status</label>
                    <p id="detailStatus"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const params = new URLSearchParams(window.location.search);
      let visitorId = params.get('id');

      if (!visitorId) {
        const pathParts = window.location.pathname.split('/visitor/');
        if (pathParts.length > 1) {
          visitorId = pathParts[1].split('?')[0];
        }
      }

      if (!visitorId) {
        showError('No visitor ID provided.');
        return;
      }

      await loadVisitor(visitorId);
    });

    async function loadVisitor(id) {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('visitorContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';

      try {
        const res = await fetch('/api/visitors/' + encodeURIComponent(id));
        if (!res.ok) {
          showError('Visitor not found. The visitor ID "' + id + '" does not exist in the system.');
          return;
        }

        const v = await res.json();
        renderVisitor(v);
      } catch (err) {
        showError('Error loading visitor: ' + err.message);
      }
    }

    function renderVisitor(v) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('visitorContent').style.display = 'block';

      document.getElementById('detailVisitorId').textContent = 'Visitor: ' + v.visitorId;

      const statusBadge = v.status === 'Active'
        ? '<span class="badge badge-active" style="font-size:14px;padding:6px 16px">Active</span>'
        : '<span class="badge badge-checkout" style="font-size:14px;padding:6px 16px">Checked Out</span>';
      document.getElementById('detailStatusBadge').innerHTML = statusBadge;

      if (v.photo) {
        document.getElementById('detailPhotoContainer').innerHTML = '<img src="/uploads/' + v.photo + '?t=' + Date.now() + '" alt="Visitor Photo">';
      } else {
        document.getElementById('detailPhotoContainer').innerHTML = '<div class="no-photo">' + v.fullName.charAt(0).toUpperCase() + '</div>';
      }

      document.getElementById('detailFullName').textContent = v.fullName;
      document.getElementById('detailPhone').textContent = v.phone;
      document.getElementById('detailEmail').textContent = v.email || 'Not provided';
      document.getElementById('detailAddress').textContent = v.address;
      document.getElementById('detailCompany').textContent = v.company;
      document.getElementById('detailPersonToMeet').textContent = v.personToMeet;
      document.getElementById('detailPurpose').textContent = v.purpose;
      document.getElementById('detailEntryDate').textContent = v.entryDate;
      document.getElementById('detailEntryTime').textContent = v.entryTime;
      document.getElementById('detailExitTime').textContent = v.exitTime || 'Not checked out';
      document.getElementById('detailVehicleNumber').textContent = v.vehicleNumber || 'Not provided';
      document.getElementById('detailStatus').innerHTML = statusBadge;

      document.getElementById('passLink').href = '/pass.html?id=' + v.visitorId;
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('visitorContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
    }
  </script>
</body>
</html>
