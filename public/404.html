<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="layout">
    <main class="main-content" style="margin-left:0;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;max-width:500px">
        <div style="font-size:80px;font-weight:700;color:var(--primary);margin-bottom:16px">404</div>
        <h1 style="font-size:28px;margin-bottom:8px">Page Not Found</h1>
        <p style="color:var(--text-light);margin-bottom:24px">The page you are looking for does not exist or has been moved.</p>
        <div class="flex gap-2 justify-center">
          <a href="/" class="btn btn-primary">Register Visitor</a>
          <a href="/dashboard.html" class="btn btn-outline">Dashboard</a>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
